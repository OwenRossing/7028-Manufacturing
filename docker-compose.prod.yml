# Production Docker Compose
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# This file manages both the database and the built web container.
# The web container reads APP_MODE to decide what to do on startup.
#
# For a truly external database (Railway, RDS, Supabase, etc.),
# remove the `db` service and `depends_on` block, and set DATABASE_URL
# to your external connection string.

services:
  db:
    image: postgres:16
    container_name: frc_parts_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: frc_parts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres   # ← change this before going live
    volumes:
      - db_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d frc_parts"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production            # uses the slim production image
    container_name: frc_parts_web_prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/frc_parts?schema=public
      APP_MODE: local               # local = migrate (no seed) + next start
      MAX_UPLOAD_MB: 10
      # Uncomment and fill in the rest of your production env vars:
      # GOOGLE_CLIENT_ID: ""
      # ADMIN_EMAILS: ""
      # STORAGE_DRIVER: local       # switch to s3 for persistent photo storage
      # NEXT_PUBLIC_STORAGE_PUBLIC_BASE_URL: ""
    ports:
      - "3000:3000"
    volumes:
      - ./public/uploads:/app/public/uploads   # persist uploaded photos

volumes:
  db_data_prod:
